name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO: ${{ github.repository }}
          API_PORT: ${{ secrets.API_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          BCRYPT_ROUNDS: ${{ secrets.BCRYPT_ROUNDS }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          CATALOG_API_URL: ${{ secrets.CATALOG_API_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REPO,API_PORT,JWT_SECRET,JWT_EXPIRES_IN,BCRYPT_ROUNDS,MONGO_URI,CATALOG_API_URL,CORS_ORIGINS,VITE_API_URL
          script: |
            set -e

            mkdir -p ~/app
            cd ~/app

            if [ ! -d ".git" ]; then
              git clone https://github.com/${REPO}.git .
            else
              git pull --ff-only origin main
            fi

            cat > api/.env <<EOF
            PORT=${API_PORT:-8080}
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
            BCRYPT_ROUNDS=${BCRYPT_ROUNDS}
            MONGO_URI=${MONGO_URI}
            CATALOG_API_URL=${CATALOG_API_URL}
            CORS_ORIGINS=${CORS_ORIGINS}
            EOF

            cat > web-app/.env <<EOF
            VITE_API_URL=${VITE_API_URL:-/api}
            EOF

            docker network create ecommerce-network || true

            docker build -t ecommerce-api ./api
            docker build -t ecommerce-web ./web-app

            docker stop ecommerce-api || true
            docker rm ecommerce-api || true
            docker stop ecommerce-web || true
            docker rm ecommerce-web || true

            docker run -d \
              --name ecommerce-api \
              --env-file ./api/.env \
              --network ecommerce-network \
              -p 8080:8080 \
              ecommerce-api

            docker run -d \
              --name ecommerce-web \
              --network ecommerce-network \
              -p 80:80 \
              ecommerce-web
